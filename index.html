<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Contadores de Tiempo</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="components/button/button.css" />
    <link rel="stylesheet" href="components/modal/modal.css" />
    <link rel="stylesheet" href="components/popover/popover.css" />
    <link rel="stylesheet" href="components/toast/toast.css" />
    <link rel="stylesheet" href="components/dropdown/dropdown.css" />
    <link rel="stylesheet" href="components/avatar/avatar.css" />
    <link rel="stylesheet" href="components/bottom-sheet/bottom-sheet.css" />
    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Contadores de Tiempo</h1>
      <!-- El formulario original se oculta, ahora se usa el modal -->
      <form id="counter-form" style="display: none"></form>
      <div class="header-action-row">
        <div class="btn-group add-group" id="add-button-container"></div>
        <div id="auth-status-indicator"></div>
      </div>
      <div class="filter-tags-section">
        <label style="font-weight: 500; color: #007bff"
          >Filtrar por etiquetas:</label
        >
        <div id="filter-tags-list"></div>
      </div>
      <div class="counters-toolbar">
        <div id="filters-mobile-toolbar" class="filters-mobile-only"></div>
        <div id="sort-dropdown-container" class="filters-desktop-only"></div>
        <div id="time-filter-dropdown-container" class="filters-desktop-only"></div>
      </div>
      <ul id="counters-list"></ul>
    </div>
    <!-- Modal para crear/editar contador con etiquetas -->
    <div id="counter-modal" class="modal" style="display: none">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title" id="counter-modal-title"
            >Nuevo contador</span
          >
          <button class="modal-close" id="close-counter-modal" type="button">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <form id="counter-form-modal">
            <input
              type="text"
              id="modal-counter-name"
              class="form-control"
              placeholder="Nombre del contador"
              required
            />
            <div class="date-time-row">
              <input type="date" id="modal-counter-date" class="form-control" required />
              <div class="time-input-wrapper">
                <input type="time" id="modal-counter-time" class="form-control" />
                <div id="clear-time-btn-container" style="flex-shrink: 0;"></div>
              </div>
            </div>
            <small id="modal-date-hint" class="form-hint">
              El año seleccionado será ignorado. Solo se usarán el día y el mes
              para eventos anuales.
            </small>

            <!-- Frequency Selection -->
            <div class="form-group">
              <label for="modal-counter-frequency" class="form-label"
                >Frecuencia:</label
              >
              <div id="frequency-dropdown-container"></div>
              <input type="hidden" id="modal-counter-frequency" name="modal-counter-frequency" value="none" />
            </div>

            <!-- End Date for Recurring Events -->
            <div id="modal-end-date-group" class="form-group" style="display: none;">
              <label for="modal-counter-end-date" class="form-label"
                >Fecha de finalización (opcional):</label
              >
              <input
                type="date"
                id="modal-counter-end-date"
                name="modal-counter-end-date"
                class="form-control"
              />
            </div>

            <div class="tags-section">
              <div class="tags-input-row">
                <input
                  type="text"
                  id="tag-input"
                  class="form-control"
                  placeholder="Añadir etiqueta"
                />
                <button type="button" id="add-tag-btn">Añadir</button>
              </div>
              <div id="tag-suggestions" style="margin-bottom: 4px"></div>
              <div id="tags-list"></div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" id="cancel-counter-modal">Cancelar</button>
          <button type="submit" id="save-counter-btn" form="counter-form-modal">
            Guardar
          </button>
        </div>
      </div>
    </div>
    <!-- Modal de configuración -->
    <div id="config-modal" class="modal" style="display: none">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">Configuración</span>
          <button class="modal-close" id="close-config-modal" type="button">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <div
            id="units-section"
            class="units-section-modal units-section-box"
            style="margin-top: 22px"
          >
            <div class="units-section-title">
              <i data-lucide="clock" style="margin-right: 7px"></i
              >Unidades de tiempo
            </div>
            <div id="config-form-modal" class="units-buttons-row">
              <button type="button" class="unit-btn" data-unit="years">Años</button>
              <button type="button" class="unit-btn" data-unit="months">Meses</button>
              <button type="button" class="unit-btn" data-unit="weeks">Semanas</button>
              <button type="button" class="unit-btn" data-unit="days">Días</button>
              <button type="button" class="unit-btn" data-unit="hours">Horas</button>
              <button type="button" class="unit-btn" data-unit="minutes">Min</button>
              <button type="button" class="unit-btn" data-unit="seconds">Seg</button>
            </div>
          </div>
          <div
            id="import-export-section"
            class="units-section-modal units-section-box"
            style="margin-top: 22px"
          >
            <div class="units-section-title">
              <i
                data-lucide="file-spreadsheet"
                style="margin-right: 7px; color: #1d6f42"
              ></i
              >Importar / Exportar
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap">
              <button id="export-excel-btn" class="btn-backup" type="button">
                <i data-lucide="download"></i> Exportar a Excel
              </button>
              <label
                for="import-excel-input"
                class="btn-restore"
                style="
                  cursor: pointer;
                  display: inline-flex;
                  align-items: center;
                  gap: 6px;
                "
              >
                <i data-lucide="upload"></i> Importar desde Excel
                <input
                  id="import-excel-input"
                  type="file"
                  accept=".xlsx,.xls"
                  style="display: none"
                />
              </label>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" id="close-config-modal-footer">Cerrar</button>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="dist/app.js"></script>
  </body>
</html>
